syntax = "proto3";
package novachat;

message RegisterRequest {
    string username     = 1;
    string password     = 2;
    string display_name = 3;
}

message RegisterResponse {
    string user_id      = 1;
    string display_name = 2;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token        = 1;
    string user_id      = 2;
    string display_name = 3;
    string avatar_url   = 4;
}

message LogoutRequest {
    string token = 1;
}
