syntax = "proto3";
package novachat;

// Conversation ID is generated by the client: min(sender_id, receiver_id) + ":" + max(...)

message SendMessageRequest {
    string token        = 1;
    string local_msg_id = 2;   // Client-side temp ID; echoed back in the response
    string receiver_id  = 3;
    string content      = 4;
}

message SendMessageResponse {
    string local_msg_id    = 1;   // Matches the request
    string server_msg_id   = 2;   // Server-assigned persistent ID
    string conversation_id = 3;
    int64  timestamp_ms    = 4;
}

// Server push to the message receiver (seq_id = 0)
message MessagePush {
    string message_id      = 1;
    string conversation_id = 2;
    string sender_id       = 3;
    string content         = 4;
    int64  timestamp_ms    = 5;
}

message HistoryMessageRecord {
    string message_id      = 1;
    string conversation_id = 2;
    string sender_id       = 3;
    string content         = 4;
    int64  timestamp_ms    = 5;
}

message GetHistoryRequest {
    string token            = 1;
    string conversation_id  = 2;
    int64  before_timestamp = 3;   // 0 = latest page; non-zero = load messages older than this
    int32  limit            = 4;   // Max 50
}

message GetHistoryResponse {
    repeated HistoryMessageRecord messages = 1;
    bool has_more                          = 2;
}

message GetConversationsRequest {
    string token = 1;
}

message ServerConversationRecord {
    string conversation_id      = 1;
    string peer_user_id         = 2;
    string last_message_preview = 3;
    int64  last_message_time    = 4;
}

message GetConversationsResponse {
    repeated ServerConversationRecord conversations = 1;
}
